source: TTHC
description: "Quản lý thủ tục hành chính — Hệ thống tiếp nhận và xử lý hồ sơ đăng ký chào bán / phát hành chứng khoán theo mô hình EAV (Orchard Core / SQLite)"
brd_entries:

  # ─── UID-01 Hồ sơ chào bán chứng khoán ───────────────────────────────────

  - brd_id: BRD-SRC-TTHC-ContentItemIndex
    brd_name: "Design Atomic từ nguồn TTHC bảng ContentItemIndex"
    type: Theo Source
    ba_email: username@fssc.com.vn
    steward_email: username@ubck.com.vn
    content:
      table_meaning: "Hồ sơ đăng ký chào bán / phát hành chứng khoán và kết quả xét duyệt (GCN / văn bản từ chối) — toàn bộ lưu trong cùng bảng ContentItemIndex, phân biệt bởi ContentType (Latest=1, Published=1)"
      functional_group: "UID-01 Hồ sơ chào bán chứng khoán"
      scope_status: in_scope
      scope_reason: null
      table: ContentItemIndex
      related_tables:
        - table: TextFieldIndex
          relation: "1-N — field dạng text của hồ sơ Eform (qua ContentItemId)"
        - table: HtmlFieldIndex
          relation: "1-N — field dạng HTML của hồ sơ Eform"
        - table: MultiTextFieldIndex
          relation: "1-N — field dạng đa văn bản của hồ sơ Eform"
        - table: LinkFieldIndex
          relation: "1-N — field dạng liên kết của hồ sơ Eform"
        - table: NumericFieldIndex
          relation: "1-N — field dạng số của hồ sơ Eform"
        - table: DateFieldIndex
          relation: "1-N — field dạng ngày của hồ sơ Eform"
        - table: DateTimeFieldIndex
          relation: "1-N — field dạng ngày giờ của hồ sơ Eform"
        - table: TimeFieldIndex
          relation: "1-N — field dạng giờ của hồ sơ Eform"
        - table: BooleanFieldIndex
          relation: "1-N — field dạng boolean của hồ sơ Eform"
        - table: ContentPickerFieldIndex
          relation: "1-N — field dạng content picker của hồ sơ Eform"
        - table: UserPickerFieldIndex
          relation: "1-N — field dạng user picker của hồ sơ Eform"
        - table: WorkflowIndex
          relation: "1-N — workflow instance xét duyệt gắn với hồ sơ (qua CorrelationId)"
      notes: "Map vào Securities Offering Application (Documentation/Regulatory Report). ETL filter: Published=1 AND Latest=1. content_type_code (TTHC_CONTENT_TYPE) phân biệt 11 loại hồ sơ chào bán và các loại kết quả (GCN / từ chối). Pending T1-01: ContentType GCN và từ chối chưa xác nhận trên DB thực tế."
      data_volume_hint: null
      refresh_frequency: daily

