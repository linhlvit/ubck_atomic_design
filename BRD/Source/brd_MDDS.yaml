source: MDDS
description: "Hệ thống phân phối dữ liệu thị trường — Bảng giá, sổ khớp, chỉ số thị trường realtime"
brd_entries:
  # UID-01 — Thị trường và chỉ số tổng hợp
  - brd_id: BRD-SRC-MDDS-MarketInfor
    brd_name: "Design Atomic từ nguồn MDDS bảng MarketInfor"
    type: Theo Source
    ba_email: username@fssc.com.vn
    steward_email: username@ubck.com.vn
    content:
      table_meaning: "Snapshot tổng hợp trạng thái sàn/chỉ số — điểm chỉ số, tổng KL/GT, số mã tăng/giảm/trần/sàn, trạng thái phiên, giao dịch thỏa thuận"
      functional_group: "UID-01 Thị trường và chỉ số tổng hợp"
      scope_status: in_scope
      scope_reason: null
      table: MarketInfor
      related_tables:
        - table: IDXInfor
          relation: "Tham chiếu — chi tiết chỉ số thị trường"
      notes: null
      data_volume_hint: null
      refresh_frequency: null

  - brd_id: BRD-SRC-MDDS-IDXInfor
    brd_name: "Design Atomic từ nguồn MDDS bảng IDXInfor"
    type: Theo Source
    ba_email: username@fssc.com.vn
    steward_email: username@ubck.com.vn
    content:
      table_meaning: "Snapshot đầy đủ của một chỉ số thị trường: giá trị, OHLC trong ngày, thống kê mã trong rổ, phân loại loại chỉ số"
      functional_group: "UID-01 Thị trường và chỉ số tổng hợp"
      scope_status: in_scope
      scope_reason: null
      table: IDXInfor
      related_tables:
        - table: CSIDXInfor
          relation: "1-N — thành phần rổ chỉ số"
      notes: null
      data_volume_hint: null
      refresh_frequency: null

  - brd_id: BRD-SRC-MDDS-CSIDXInfor
    brd_name: "Design Atomic từ nguồn MDDS bảng CSIDXInfor"
    type: Theo Source
    ba_email: username@fssc.com.vn
    steward_email: username@ubck.com.vn
    content:
      table_meaning: "Thành phần rổ chỉ số: cặp (IndexCode × Symbol) với tỷ trọng và ngày vào rổ"
      functional_group: "UID-01 Thị trường và chỉ số tổng hợp"
      scope_status: in_scope
      scope_reason: null
      table: CSIDXInfor
      related_tables:
        - table: IDXInfor
          relation: "FK — chỉ số cha của constituent"
        - table: StockInfor
          relation: "FK — mã chứng khoán trong rổ"
      notes: null
      data_volume_hint: null
      refresh_frequency: null

  # UID-02 — Bảng giá chứng khoán và khớp lệnh
  - brd_id: BRD-SRC-MDDS-StockInfor
    brd_name: "Design Atomic từ nguồn MDDS bảng StockInfor"
    type: Theo Source
    ba_email: username@fssc.com.vn
    steward_email: username@ubck.com.vn
    content:
      table_meaning: "Snapshot bảng giá đa loại instrument tại một thời điểm — giá, sổ lệnh, tổng tích lũy, NĐTNN, đặc thù derivative/warrant"
      functional_group: "UID-02 Bảng giá chứng khoán và khớp lệnh"
      scope_status: in_scope
      scope_reason: null
      table: StockInfor
      related_tables:
        - table: TransLog
          relation: "1-N — log khớp lệnh tick-by-tick"
