schema_type: data_model
schema_version: "1.0"

ldm:
  id: ATM-ip_alt_identn-IDS.identity
  logical_name: "Involved Party Alternative Identification"

  physical_name: ip_alt_identn
  layer: Atomic
  version: "1.0"
  status: approved
  bcv_core_object: Involved Party
  bcv_concept: Shared Entity
  table_type: Fundamental
  etl_pattern: SCD4A
  source: IDS
  description: |
    Lưu trữ các giấy tờ định danh thay thế của Involved Party (CMND/CCCD/Hộ chiếu/Giấy phép kinh doanh/Chứng chỉ hành nghề). Mỗi dòng = 1 loại giấy tờ từ 1 nguồn.
  owner:
    steward: username@ubck.com.vn
    data_modeler: username@fssc.com.vn
  references:
    brd: BRD-SRC-IDS-identity

attributes:
  - name: Involved Party Id
    physical_name: ip_id
    business_meaning: FK đến Stock Holder.
    data_domain: Surrogate Key
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: IDS
    source_table: identity
    source_column: IDS.identity.stock_holder_id
    comment: "FK target: Stock Holder.Stock Holder Id. Shared entity — không có PK surrogate riêng."
    classification_context: "Source System Code = 'IDS_identity' | Identification Type Code = '(source)'"
    etl_derived_value: null

  - name: Involved Party Code
    physical_name: ip_code
    business_meaning: Mã cổ đông.
    data_domain: Text
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: IDS
    source_table: identity
    source_column: IDS.identity.stock_holder_id
    comment: "Lookup pair: Stock Holder.Stock Holder Code. Pair with Involved Party Id."
    classification_context: "Source System Code = 'IDS_identity' | Identification Type Code = '(source)'"
    etl_derived_value: null

  - name: Source System Code
    physical_name: src_stm_code
    business_meaning: Mã nguồn dữ liệu.
    data_domain: Classification Value
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: IDS
    source_table: identity
    source_column: null
    comment: "Scheme: SOURCE_SYSTEM. BK. Hardcode."
    classification_context: "Source System Code = 'IDS_identity' | Identification Type Code = '(source)'"
    etl_derived_value: null

  - name: Identification Type Code
    physical_name: identn_tp_code
    business_meaning: Loại giấy tờ định danh (CMND/CCCD/Hộ chiếu/GPKD).
    data_domain: Classification Value
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: IDS
    source_table: identity
    source_column: IDS.identity.identity_type_cd
    comment: "Scheme: IP_ALT_ID_TYPE. ETL map identity_type_cd (scheme IDS_IDENTITY_TYPE theo lookup_values) sang scheme chuẩn IP_ALT_ID_TYPE khi ingestion."
    classification_context: "Source System Code = 'IDS_identity' | Identification Type Code = '(source)'"
    etl_derived_value: null

  - name: Identification Number
    physical_name: identn_nbr
    business_meaning: Số giấy tờ.
    data_domain: Text
    data_type: string
    nullable: true
    is_primary_key: false
    source_system: IDS
    source_table: identity
    source_column: IDS.identity.identity_no
    comment: null
    classification_context: "Source System Code = 'IDS_identity' | Identification Type Code = '(source)'"
    etl_derived_value: null

  - name: Issue Date
    physical_name: issu_dt
    business_meaning: Ngày cấp giấy tờ.
    data_domain: Date
    data_type: date
    nullable: true
    is_primary_key: false
    source_system: IDS
    source_table: identity
    source_column: IDS.identity.identity_issued_date
    comment: null
    classification_context: "Source System Code = 'IDS_identity' | Identification Type Code = '(source)'"
    etl_derived_value: null

  - name: Issuing Authority Name
    physical_name: issu_ahr_nm
    business_meaning: Nơi cấp giấy tờ.
    data_domain: Text
    data_type: string
    nullable: true
    is_primary_key: false
    source_system: IDS
    source_table: identity
    source_column: IDS.identity.identity_issued_place
    comment: null
    classification_context: "Source System Code = 'IDS_identity' | Identification Type Code = '(source)'"
    etl_derived_value: null
