    physical_name: ip_id
    business_meaning: FK đến Foreign Investor.
    data_domain: Surrogate Key
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: FIMS
    source_table: INVESTOR
    source_column: FIMS.INVESTOR.id
    comment: "FK target: Foreign Investor.Foreign Investor Id. Shared entity — không có PK surrogate riêng."
    classification_context: "Source System Code = 'FIMS_INVESTOR' | Identification Type Code = 'CITIZEN_ID'"
    etl_derived_value: null

