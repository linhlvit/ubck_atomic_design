schema_type: data_model
schema_version: "1.0"

ldm:
  id: ATM-geo-FIMS.NATIONAL
  logical_name: "Geographic Area"

  physical_name: geo
  layer: Atomic
  version: "1.0"
  status: approved
  bcv_core_object: Location
  bcv_concept: "[Location] Geographic Area"
  table_type: Fundamental
  etl_pattern: SCD4A
  source: FIMS
  description: |
    Đơn vị địa lý dùng làm FK tham chiếu: quốc gia/quốc tịch (COUNTRY), vùng/miền (REGION), tỉnh/thành phố mới/cũ (PROVINCE/PROVINCE_OLD), quận/huyện cũ (DISTRICT_OLD), phường/xã mới/cũ (WARD/WARD_OLD). Phân biệt bằng geographic_area_type_code. Hỗ trợ song song bộ danh mục pre- và post-sáp nhập hành chính 2025.
  owner:
    steward: username@ubck.com.vn
    data_modeler: username@fssc.com.vn
  references:
    brd: BRD-SRC-FIMS-NATIONAL

