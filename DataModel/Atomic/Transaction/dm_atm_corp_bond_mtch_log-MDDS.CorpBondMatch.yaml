schema_type: data_model
schema_version: "1.0"

ldm:
  id: ATM-corp_bond_mtch_log-MDDS.CorpBondMatch
  logical_name: "Corporate Bond Match Log"

  physical_name: corp_bond_mtch_log
  layer: Atomic
  version: "1.0"
  status: draft
  bcv_core_object: Transaction
  bcv_concept: "[Transaction] Sell Transaction"
  table_type: Fact Append
  etl_pattern: Fact Append
  source: MDDS
  description: |
    Log tick-by-tick từng lần khớp lệnh trái phiếu doanh nghiệp theo thứ tự ConfirmNoCorpBond. Grain: 1 dòng = 1 lần khớp (symbol × ngày × confirm_no). Insert-only.
  owner:
    steward: username@ubck.com.vn
    data_modeler: username@fssc.com.vn
  references:
    brd: BRD-SRC-MDDS-CorpBondMatch

