schema_type: data_model
schema_version: "1.0"

ldm:
  id: ATM-indx_constituent_snpst-MDDS.CSIDXInfor
  logical_name: "Atomic - Index Constituent Snapshot – source MDDS.CSIDXInfor"
  physical_name: indx_constituent_snpst
  version: "1.0"
  status: approved
  bcv_core_object: Group
  bcv_concept: "[Group] Share Index"
  table_type: Fact Snapshot
  etl_pattern: Fact Append
  source: MDDS
  description: |
    Snapshot thành phần rổ chỉ số thị trường: mã chứng khoán thuộc rổ nào (IndexCode × Symbol × ngày giao dịch). Có attribute nghiệp vụ: tỷ trọng (Weighted) và ngày vào rổ (AddDate).
  owner:
    steward: username@ubck.com.vn
    data_modeler: username@fssc.com.vn
  references:
    brd: BRD-SRC-MDDS-CSIDXInfor

attributes:
  - name: Index Constituent Snapshot Id
    physical_name: indx_constituent_snpst_id
    business_meaning: Khóa đại diện cho bản ghi thành phần rổ chỉ số.
    data_domain: Surrogate Key
    data_type: string
    nullable: false
    is_primary_key: true
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: null
    comment: PK surrogate.
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Index Constituent Snapshot Code
    physical_name: indx_constituent_snpst_code
    business_meaning: Định danh duy nhất bản tin (GUID). BK.
    data_domain: Text
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.ID
    comment: BK chính. PK nguồn string (GUID) — khớp tự nhiên với Text.
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Source System Code
    physical_name: src_stm_code
    business_meaning: Mã nguồn dữ liệu.
    data_domain: Classification Value
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: null
    comment: "Scheme: SOURCE_SYSTEM. BK. Hardcode."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Market Index Snapshot Id
    physical_name: mkt_indx_snpst_id
    business_meaning: FK đến bản tin thông tin chỉ số tương ứng.
    data_domain: Surrogate Key
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.IndexCode
    comment: "FK target: Market Index Snapshot.Market Index Snapshot Id. Join qua (index_code / trading_date)."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Index Code
    physical_name: indx_code
    business_meaning: Mã chỉ số (VN30 / HNX30 / VNFINSELECT...). BK.
    data_domain: Text
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.IndexCode
    comment: "Lookup pair: Market Index Snapshot.Index Code. Pair with Market Index Snapshot Id. BK nghiệp vụ. Nguồn string — khớp tự nhiên với Text."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Security Trading Snapshot Id
    physical_name: scr_tdg_snpst_id
    business_meaning: FK đến bản tin thông tin giao dịch chứng khoán thành viên.
    data_domain: Surrogate Key
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.Symbol
    comment: "FK target: Security Trading Snapshot.Security Trading Snapshot Id. Join qua (symbol / trading_date)."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Symbol
    physical_name: symb
    business_meaning: Mã chứng khoán thành viên trong rổ chỉ số. BK.
    data_domain: Text
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.Symbol
    comment: "Lookup pair: Security Trading Snapshot.Symbol. Pair with Security Trading Snapshot Id. BK nghiệp vụ. Nguồn string — khớp tự nhiên với Text."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Snapshot Time
    physical_name: snpst_tm
    business_meaning: "Thời điểm snapshot trong ngày. BK. Nguồn ghi là TradingDate nhưng tài liệu gốc mô tả \"định dạng HHmmss\" — ngữ nghĩa là timestamp nội ngày, không phải ngày giao dịch. Cần xác nhận lại với đội nguồn."
    data_domain: Text
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.TradingDate
    comment: "BK. Nguồn string — lưu dạng Text theo quyết định T2-02. Data type nguồn không rõ là date hay HHmmss string — cần profile trước khi ETL. BK = (index_code / symbol / snapshot_time)."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Floor Code
    physical_name: flr_code
    business_meaning: Mã sàn giao dịch của mã chứng khoán.
    data_domain: Classification Value
    data_type: string
    nullable: true
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.FloorCode
    comment: "Scheme: MDDS_FLOOR_CODE. Nguồn string — khớp tự nhiên với Classification Value."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Index Id
    physical_name: indx_id
    business_meaning: ID số của sàn giao dịch.
    data_domain: Text
    data_type: string
    nullable: true
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.IndexId
    comment: Nguồn int — ETL cần convert sang string. Mã số nội bộ sàn — denormalized text.
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Weighted
    physical_name: wght
    business_meaning: "Tỷ trọng (weight) của mã trong rổ chỉ số (dạng thập phân — ví dụ 0.0513 = 5.13%)."
    data_domain: Percentage
    data_type: decimal(5,2)
    nullable: true
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.Weighted
    comment: "Nguồn string — ETL cần parse sang decimal. Cần validate không có giá trị non-numeric."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Add Date
    physical_name: add_dt
    business_meaning: Ngày mã được thêm vào rổ chỉ số.
    data_domain: Date
    data_type: date
    nullable: true
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.AddDate
    comment: Nguồn string — ETL cần parse sang Date. Cần validate format ngày hợp lệ.
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Stock Contribution
    physical_name: stk_ctb
    business_meaning: Giá trị chỉ số tại thời điểm hiện tại (dùng để tính index contribution).
    data_domain: Currency Amount
    data_type: decimal(23,2)
    nullable: true
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.StockNo
    comment: "Nguồn string — ETL cần parse sang decimal. Cần validate không có giá trị non-numeric."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null

  - name: Total Match Volume
    physical_name: tot_mtch_vol
    business_meaning: Tổng khối lượng khớp lệnh của mã này trong ngày (lô chẵn).
    data_domain: Small Counter
    data_type: int
    nullable: true
    is_primary_key: false
    source_system: MDDS
    source_table: CSIDXInfor
    source_column: MDDS.CSIDXInfor.TotalQtty
    comment: "Nguồn string — ETL cần parse sang int. Cần validate không có giá trị non-numeric và không vượt quá INT_MAX."
    classification_context: "Source System Code = 'MDDS_CSIDXInfor'"
    etl_derived_value: null
