schema_type: data_model
schema_version: "1.0"

ldm:
  id: ATM-scr_ordr-OrderTrade.Order_HNX
  logical_name: "Securities Order"

  physical_name: scr_ordr
  layer: Atomic
  version: "1.0"
  status: approved
  bcv_core_object: Communication
  bcv_concept: "[Communication] Financial Market Order"
  table_type: Fact Append
  etl_pattern: Fact Append
  source: OrderTrade
  description: |
    Sự kiện trong vòng đời lệnh giao dịch chứng khoán trên sàn HOSE và HNX — lệnh mới/sửa/hủy từ hệ thống KRX. Mỗi dòng = 1 event. Gộp 2 sàn phân biệt bằng market_id.
  owner:
    steward: username@ubck.com.vn
    data_modeler: username@fssc.com.vn
  references:
    brd: BRD-SRC-OrderTrade-Order_HNX

attributes:
  - name: Securities Order Id
    physical_name: scr_ordr_id
    business_meaning: Khóa đại diện cho sự kiện lệnh giao dịch chứng khoán.
    data_domain: Surrogate Key
    data_type: string
    nullable: false
    is_primary_key: true
    source_system: OrderTrade
    source_table: Order_HNX
    source_column: null
    comment: "PK surrogate. Entity \"Securities Order\" gộp Order_HOSE + Order_HNX phân biệt qua Market Id Code."
    classification_context: "Source System Code = 'OrderTrade_Order_HNX'"
    etl_derived_value: null

  - name: Securities Order Code
    physical_name: scr_ordr_code
    business_meaning: Mã định danh logic của lệnh (17 ký tự). BK chính.
    data_domain: Text
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: OrderTrade
    source_table: Order_HNX
    source_column: OrderTrade.Order_HNX.order ID
    comment: BK chính. Order ID ổn định hơn Order Reception Number (reset mỗi ngày). Unique trong luồng KRX.
    classification_context: "Source System Code = 'OrderTrade_Order_HNX'"
    etl_derived_value: null

  - name: Order Accept Number
    physical_name: ordr_acpt_nbr
    business_meaning: Số định danh lệnh tại KRX tại thời điểm tiếp nhận. Tăng dần — unique trong ngày.
    data_domain: Text
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: OrderTrade
    source_table: Order_HNX
    source_column: OrderTrade.Order_HNX.Order Reception Number
    comment: "BK phụ HNX — tương đương Order Accept # của HOSE. Unique trong (Trade Date + Symbol). Nguồn Number(11) — ETL convert sang string."
    classification_context: "Source System Code = 'OrderTrade_Order_HNX'"
    etl_derived_value: null

  - name: Source System Code
    physical_name: src_stm_code
    business_meaning: Mã hệ thống nguồn.
    data_domain: Classification Value
    data_type: string
    nullable: false
    is_primary_key: false
    source_system: OrderTrade
    source_table: Order_HNX
    source_column: null
    comment: null
    classification_context: "Source System Code = 'OrderTrade_Order_HNX'"
    etl_derived_value: null

  - name: Trade Date
    physical_name: trd_dt
    business_meaning: Ngày giao dịch (yyyymmdd).
